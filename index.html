<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TECH - Plataforma Oficial</title>
    <style>
        :root {
            --bg-main: #0b0c10;
            --bg-card: #1f2833;
            --primary: #45f3ff;
            --primary-glow: rgba(69, 243, 255, 0.3);
            --text-main: #c5c6c7;
            --text-title: #ffffff;
            --accent: #1f2833;
            --success: #00ffcc;
            --gray: #66fcf1;
            --transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* CONTAINER GLOBAL MOBILE-FIRST */
        .app-container {
            width: 100%;
            max-width: 430px;
            height: 100vh;
            background: radial-gradient(circle at top right, #1a233a 0%, var(--bg-main) 100%);
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
        }

        @media (min-width: 440px) {
            .app-container {
                height: 850px;
                border-radius: 30px;
                border: 1px solid rgba(69, 243, 255, 0.1);
            }
        }

        /* ESTADOS DE TELAS */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 30px;
            display: flex;
            flex-direction: column;
            opacity: 0;
            pointer-events: none;
            transform: scale(0.95);
            transition: var(--transition);
            z-index: 1;
        }

        .screen.active {
            opacity: 1;
            pointer-events: auto;
            transform: scale(1);
            z-index: 2;
        }

        /* TELA DE LOGIN */
        .login-screen {
            justify-content: space-between;
            align-items: center;
            text-align: center;
        }

        .brand-section {
            margin-top: 60px;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .logo-box {
            font-size: 56px;
            font-weight: 900;
            color: var(--text-title);
            letter-spacing: 6px;
            position: relative;
            display: inline-block;
            text-shadow: 0 0 20px var(--primary-glow);
        }

        .logo-box::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
        }

        .tagline {
            font-size: 14px;
            color: var(--text-main);
            margin-top: 20px;
            font-weight: 300;
            letter-spacing: 0.5px;
            opacity: 0.8;
        }

        .form-section {
            width: 100%;
            margin-bottom: 40px;
        }

        .input-wrapper {
            position: relative;
            width: 100%;
            margin-bottom: 20px;
        }

        .input-wrapper input {
            width: 100%;
            background: rgba(31, 40, 51, 0.6);
            border: 1px solid rgba(69, 243, 255, 0.2);
            border-radius: 15px;
            padding: 18px 20px;
            color: var(--text-title);
            font-size: 16px;
            outline: none;
            text-align: center;
            letter-spacing: 1px;
            transition: var(--transition);
            backdrop-filter: blur(10px);
        }

        .input-wrapper input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--primary-glow);
            background: rgba(31, 40, 51, 0.9);
        }

        .btn-main {
            width: 100%;
            background: linear-gradient(90deg, #2575fc, var(--primary));
            color: #000;
            border: none;
            border-radius: 15px;
            padding: 18px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 2px;
            box-shadow: 0 4px 15px rgba(69, 243, 255, 0.2);
            transition: var(--transition);
        }

        .btn-main:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px var(--primary-glow);
        }

        .btn-main:active {
            transform: translateY(1px);
        }

        .btn-sec {
            background: none;
            border: none;
            color: var(--text-main);
            font-size: 14px;
            letter-spacing: 1px;
            cursor: pointer;
            margin-top: 20px;
            opacity: 0.6;
            transition: var(--transition);
            text-transform: uppercase;
        }

        .btn-sec:hover {
            opacity: 1;
            color: var(--primary);
        }

        /* TELA DE CARREGAMENTO */
        .loading-screen {
            justify-content: center;
            align-items: center;
            background: var(--bg-main);
        }

        .loader {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(69, 243, 255, 0.1);
            border-radius: 50%;
            border-top-color: var(--primary);
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            margin-top: 20px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--primary);
        }

        /* TELA DO PAINEL */
        .panel-screen {
            justify-content: flex-start;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .panel-title {
            font-size: 20px;
            font-weight: 800;
            color: var(--text-title);
            letter-spacing: 1px;
        }

        .status-badge {
            background: rgba(0, 255, 204, 0.1);
            border: 1px solid var(--success);
            color: var(--success);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .user-info-card {
            background: rgba(31, 40, 51, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .avatar {
            width: 45px;
            height: 45px;
            background: rgba(69, 243, 255, 0.1);
            border: 1px solid var(--primary);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
        }

        .user-details {
            display: flex;
            flex-direction: column;
        }

        .user-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(197, 198, 199, 0.5);
        }

        .user-phone {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-title);
            margin-top: 2px;
        }

        /* METRICAS GRID */
        .metrics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .metric-card {
            background: rgba(31, 40, 51, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 25px;
            padding: 25px 20px;
            position: relative;
            overflow: hidden;
            transition: var(--transition);
        }

        .metric-card:hover {
            border-color: rgba(69, 243, 255, 0.2);
            transform: translateY(-2px);
        }

        .metric-icon {
            font-size: 24px;
            margin-bottom: 15px;
        }

        .metric-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(197, 198, 199, 0.5);
        }

        .metric-value {
            font-size: 22px;
            font-weight: 800;
            color: var(--text-title);
            margin-top: 5px;
        }

        .btn-logout {
            margin-top: auto;
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.4);
            padding: 15px;
            border-radius: 15px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 1px;
            transition: var(--transition);
        }

        .btn-logout:hover {
            background: rgba(255, 53, 94, 0.1);
            border-color: rgba(255, 53, 94, 0.3);
            color: #ff355e;
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <!-- TELA 1: LOGIN -->
        <div class="screen active" id="screen-login">
            <div class="brand-section">
                <div class="logo-box">TECH</div>
                <div class="tagline">Conecte sua conta ao universo Tech.</div>
            </div>

            <div class="form-section">
                <div class="input-wrapper">
                    <input type="tel" id="phone-input" placeholder="(55) 24999999999" maxlength="15">
                </div>
                <button class="btn-main" onclick="handleLogin()">ENTRAR</button>
                <button class="btn-sec" onclick="handleSkip()">PULAR</button>
            </div>
        </div>

        <!-- TELA 2: CARREGAMENTO -->
        <div class="screen" id="screen-loading">
            <div class="loader"></div>
            <div class="loading-text">Autenticando</div>
        </div>

        <!-- TELA 3: PAINEL INICIAL -->
        <div class="screen" id="screen-panel">
            <div class="panel-header">
                <div class="panel-title">Plataforma Tech</div>
                <div class="status-badge">Online</div>
            </div>

            <div class="user-info-card">
                <div class="avatar">📱</div>
                <div class="user-details">
                    <span class="user-label">Conta Sincronizada</span>
                    <span class="user-phone" id="display-phone">-</span>
                </div>
            </div>

            <div class="metrics-grid">
                <div class="metric-card">
                    <div class="metric-icon">💸</div>
                    <div class="metric-title">Saldo Disponível</div>
                    <div class="metric-value" id="display-balance">R$ 0,00</div>
                </div>
                <div class="metric-card">
                    <div class="metric-icon">⭐</div>
                    <div class="metric-title">Experiência XP</div>
                    <div class="metric-value" id="display-xp">0 XP</div>
                </div>
            </div>

            <button class="btn-logout" onclick="handleLogoutAction()">DESCONECTAR CONTA</button>
        </div>

    </div>

    <script>
        // Formatação simples do input de telefone
        const phoneInput = document.getElementById('phone-input');
        phoneInput.addEventListener('input', (e) => {
            let x = e.target.value.replace(/\D/g, '').match(/(\d{0,2})(\d{0,2})(\d{0,5})(\d{0,4})/);
            e.target.value = !x[2] ? x[1] : '(' + x[1] + ') ' + x[2] + (x[3] ? '' + x[3] : '') + (x[4] ? '-' + x[4] : '');
        });

        // Verifica sessão ao carregar a página
        window.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('tech_user')) {
                showScreen('screen-panel');
                renderPanelData();
            }
        });

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function triggerLoading(callback) {
            showScreen('screen-loading');
            setTimeout(() => {
                callback();
            }, 1800);
        }

        function handleLogin() {
            const rawPhone = phoneInput.value.replace(/\D/g, '');
            
            if (rawPhone.length < 10) {
                alert('Por favor, insira um número de telefone válido.');
                return;
            }

            const userData = {
                phone: phoneInput.value,
                date: new Date().toLocaleDateString('pt-BR'),
                balance: 'R$ ' + (Math.random() * (1200 - 300) + 300).toFixed(2).replace('.', ','),
                xp: Math.floor(Math.random() * (5000 - 1000) + 1000) + ' XP'
            };

            localStorage.setItem('tech_user', JSON.stringify(userData));

            triggerLoading(() => {
                showScreen('screen-panel');
                renderPanelData();
            });
        }

        function handleSkip() {
            const guestData = {
                phone: 'Convidado Anonimizado',
                date: new Date().toLocaleDateString('pt-BR'),
                balance: 'R$ 0,00',
                xp: '0 XP'
            };

            localStorage.setItem('tech_user', JSON.stringify(guestData));

            triggerLoading(() => {
                showScreen('screen-panel');
                renderPanelData();
            });
        }

        function renderPanelData() {
            const data = JSON.parse(localStorage.getItem('tech_user'));
            if (data) {
                document.getElementById('display-phone').innerText = data.phone;
                document.getElementById('display-balance').innerText = data.balance;
                document.getElementById('display-xp').innerText = data.xp;
            }
        }

        function handleLogoutAction() {
            localStorage.removeItem('tech_user');
            phoneInput.value = '';
            showScreen('screen-login');
        }
    </script>
</body>
</html>
