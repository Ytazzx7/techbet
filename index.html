<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TECH | Sistema Oficial</title>
    <!-- Fontes e Ícones -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            --bg-color: #050507;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
            --text-main: #e0e0e0;
            --text-dim: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Fundo de Partículas */
        #particles-js {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        /* Layout */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            width: 100%;
        }

        /* Header */
        header {
            text-align: center;
            padding: 40px 0;
            animation: fadeInDown 0.8s ease;
        }

        .logo-area h1 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: 4px;
            background: linear-gradient(to right, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(0, 242, 255, 0.3);
        }

        .subtitle {
            color: var(--text-dim);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 5px;
        }

        /* Status Bar */
        .status-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .status-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            padding: 12px 25px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: #00ff88;
            border-radius: 50%;
            box-shadow: 0 0 10px #00ff88;
            animation: pulse 2s infinite;
        }

        #clock {
            font-weight: 600;
            color: var(--neon-blue);
        }

        /* Menu Grid */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 50px;
            animation: fadeInUp 0.8s ease;
        }

        .menu-btn {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            padding: 40px 20px;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .menu-btn:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.06);
            border-color: var(--neon-blue);
            box-shadow: 0 10px 30px rgba(0, 242, 255, 0.15);
        }

        .menu-btn:active {
            transform: scale(0.95);
        }

        .menu-btn i {
            width: 40px;
            height: 40px;
            color: var(--neon-blue);
            filter: drop-shadow(0 0 8px var(--neon-blue));
        }

        .menu-btn span {
            font-weight: 600;
            letter-spacing: 1px;
            font-size: 1.1rem;
        }

        .menu-btn::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(188, 19, 254, 0.1) 0%, transparent 70%);
            opacity: 0;
            transition: 0.4s;
        }

        .menu-btn:hover::before {
            opacity: 1;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-card {
            background: #111115;
            border: 1px solid var(--glass-border);
            padding: 40px;
            border-radius: 30px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .loader {
            width: 50px;
            height: 50px;
            border: 3px solid var(--glass-border);
            border-top: 3px solid var(--neon-purple);
            border-radius: 50%;
            margin: 0 auto 20px;
            animation: spin 1s linear infinite;
        }

        .error-content {
            display: none;
        }

        .error-content i {
            color: #ff4d4d;
            width: 60px;
            height: 60px;
            margin-bottom: 20px;
        }

        .error-content h2 {
            margin-bottom: 10px;
            color: #ff4d4d;
        }

        .error-content p {
            color: var(--text-dim);
            margin-bottom: 30px;
        }

        .close-btn {
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple));
            border: none;
            padding: 12px 30px;
            border-radius: 12px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
        }

        .close-btn:hover {
            filter: brightness(1.2);
            box-shadow: 0 0 15px rgba(188, 19, 254, 0.4);
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 40px;
            color: var(--text-dim);
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        /* Animações */
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Mobile */
        @media (max-width: 600px) {
            .logo-area h1 { font-size: 2.2rem; }
            .menu-grid { grid-template-columns: 1fr 1fr; }
            .menu-btn { padding: 30px 15px; }
        }
    </style>
</head>
<body>

    <canvas id="particles-js"></canvas>

    <div class="container">
        <header>
            <div class="logo-area">
                <h1>TECH</h1>
                <p class="subtitle">Sistema Oficial do Bot</p>
            </div>

            <div class="status-container">
                <div class="status-card">
                    <div class="dot"></div>
                    <span>Status: <b>Online</b></span>
                </div>
                <div class="status-card">
                    <i data-lucide="zap" style="width: 14px; color: #ffca28;"></i>
                    <span>Sistemas ativos</span>
                </div>
                <div class="status-card">
                    <i data-lucide="clock" style="width: 14px; color: var(--neon-blue);"></i>
                    <span id="clock">00:00:00</span>
                </div>
            </div>
        </header>

        <main>
            <div class="menu-grid">
                <div class="menu-btn" onclick="openModule('Testes')">
                    <i data-lucide="test-tube-2"></i>
                    <span>Testes</span>
                </div>
                <div class="menu-btn" onclick="openModule('Tech')">
                    <i data-lucide="cpu"></i>
                    <span>Tech</span>
                </div>
                <div class="menu-btn" onclick="openModule('Comandos')">
                    <i data-lucide="terminal"></i>
                    <span>Comandos</span>
                </div>
                <div class="menu-btn" onclick="openModule('Cassinos')">
                    <i data-lucide="dices"></i>
                    <span>Cassinos</span>
                </div>
            </div>
        </main>
    </div>

    <footer>
        <p>© TechServices</p>
    </footer>

    <!-- Modal de Erro -->
    <div class="modal-overlay" id="modal">
        <div class="modal-card">
            <div id="loader-area">
                <div class="loader"></div>
                <p>Acessando servidor...</p>
            </div>
            
            <div class="error-content" id="error-area">
                <i data-lucide="alert-octagon"></i>
                <h2>Erro no Módulo</h2>
                <p>Sistema ainda em desenvolvimento.</p>
                <button class="close-btn" onclick="closeModal()">FECHAR</button>
            </div>
        </div>
    </div>

    <script>
        // Inicializar ícones
        lucide.createIcons();

        // Relógio Digital
        function updateClock() {
            const now = new Date();
            const time = now.toLocaleTimeString('pt-BR', { hour12: false });
            document.getElementById('clock').textContent = time;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Lógica do Modal
        const modal = document.getElementById('modal');
        const loaderArea = document.getElementById('loader-area');
        const errorArea = document.getElementById('error-area');

        function openModule(name) {
            modal.style.display = 'flex';
            loaderArea.style.display = 'block';
            errorArea.style.display = 'none';

            // Simular loading de 1.5 segundos
            setTimeout(() => {
                loaderArea.style.display = 'none';
                errorArea.style.display = 'block';
            }, 1500);
        }

        function closeModal() {
            modal.style.display = 'none';
        }

        // Sistema de Partículas Simples em Canvas
        const canvas = document.getElementById('particles-js');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2;
                this.speedX = Math.random() * 0.5 - 0.25;
                this.speedY = Math.random() * 0.5 - 0.25;
                this.opacity = Math.random() * 0.5;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                if (this.y < 0) this.y = canvas.height;
            }

            draw() {
                ctx.fillStyle = `rgba(0, 242, 255, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initParticles() {
            for (let i = 0; i < 80; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        initParticles();
        animate();
    </script>
</body>
</html>
